name: Build Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file event-service/Dockerfile --tag event-service:$(date +%s) -t event-service:latest --progress=plain
    - name: Inspect Image
      run: docker inspect event-service
